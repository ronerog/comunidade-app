version: '3.8'

services:
  # Servidor Local PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: comunidade_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: identity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
