# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — Fase 8
# Descomente o serviço `prometheus` no docker-compose.yml antes de usar.
# ─────────────────────────────────────────────────────────────────────────────
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ── Identity Service ──────────────────────────────────────────────────────
  # TODO Fase 8: adicionar spring-boot-starter-actuator + micrometer-registry-prometheus
  # no pom.xml do identity. O endpoint /actuator/prometheus fica disponível automaticamente.
  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']

  # ── Catalog Service ───────────────────────────────────────────────────────
  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']

  # ── Notification Service ──────────────────────────────────────────────────
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']

  # ── API Gateway ───────────────────────────────────────────────────────────
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8079']

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  # RabbitMQ já expõe métricas via management plugin. Instale o exporter
  # ou use o plugin prometheus nativo (rabbitmq_prometheus).
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
