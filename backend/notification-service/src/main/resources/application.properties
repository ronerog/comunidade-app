spring.application.name=notification-service
server.port=8082

# ── RabbitMQ ────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:comunidade_rabbit}
spring.rabbitmq.password=${RABBITMQ_PASS:senha}

# ── SMTP (Mailpit em desenvolvimento) ────────────────────────────
# Mailpit é um servidor SMTP fake — captura e-mails sem enviar de verdade.
# Web UI fica em http://localhost:8025 (configurado no docker-compose).
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Thymeleaf (templates de e-mail) ─────────────────────────────
# Em dev, desabilita cache para você editar templates sem reiniciar.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Configurações da aplicação ───────────────────────────────────
notification.email.from=no-reply@comunidade.local
notification.email.from-name=Plataforma Comunidade

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.comunidade.notification=DEBUG
