spring.application.name=identity-user-service
server.port=8081


# ── PostgreSQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:identity_db}
spring.datasource.username=${POSTGRES_USER:comunidade_user}
spring.datasource.password=${POSTGRES_PASSWORD:senha}

# JPA — em produção usaremos validate; em dev usamos validate + Flyway controla DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ──────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── RabbitMQ ────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:comunidade_rabbit}
spring.rabbitmq.password=${RABBITMQ_PASS:senha}

# ── Redis ────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:senha}

# ── Keycloak (OAuth2 Resource Server) ────────────────────────────
# O issuer-uri faz o Spring baixar automaticamente o JWKS do Keycloak
# e validar o JWT localmente (sem chamar o Keycloak a cada request).
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/comunidade

# ── ViaCEP (cliente externo) ─────────────────────────────────────
# Usado pelo adapter na Fase 6
integrations.viacep.base-url=https://viacep.com.br/ws

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.comunidade.identity=DEBUG
logging.level.org.springframework.security=INFO
