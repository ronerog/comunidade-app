spring.application.name=service-catalog
server.port=8083

# ── PostgreSQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${CATALOG_DB:catalog_db}
spring.datasource.username=${POSTGRES_USER:comunidade_user}
spring.datasource.password=${POSTGRES_PASSWORD:senha}

# JPA — Flyway controla DDL; Hibernate apenas valida o mapeamento contra o schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ──────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── RabbitMQ ────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:comunidade_rabbit}
spring.rabbitmq.password=${RABBITMQ_PASS:senha}

# ── Redis ────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:senha}

# ── Keycloak (OAuth2 Resource Server) ────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/comunidade

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.comunidade.catalog=DEBUG
logging.level.org.springframework.security=INFO
